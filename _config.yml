title: Topo 链 DApp 开发者文档
description: Topo 链 DApp 开发者最佳实践、POC 接入、安全、测试和上线指南。
theme: just-the-docs

permalink: pretty

defaults:
  - scope:
      path: "docs"
      type: "pages"
    values:
      layout: "default"

search_enabled: true
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false
  focus_shortcut_key: "k"

heading_anchors: true
enable_copy_code_button: true
nav_enabled: true
nav_sort: case_sensitive
nav_error_report: true
back_to_top: true
back_to_top_text: "返回顶部"

mermaid:
  version: "9.1.6"

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false
